services:
  - type: web
    name: attendance-tracker
    env: node
    plan: free
    buildCommand: npm install && npm run build && echo "Build complete - checking for files:" && ls -la public/ || echo "public folder not found"
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
