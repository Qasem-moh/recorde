services:
  - type: web
    name: attendance-tracker
    env: node
    plan: free
    buildCommand: echo "Starting build..." && npm install && echo "Running vite build..." && npm run build && echo "✅ Build complete!" && ls -la public/
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
